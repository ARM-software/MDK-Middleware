project:
  description: HTTP Web Server Upload example

  packs:
    - pack: Keil::MDK-Middleware@>=8.0.0-0
    - pack: ARM::CMSIS@>=6.1.0
    - pack: ARM::CMSIS-Compiler@>=2.1.0
    - pack: ARM::CMSIS-RTX@>=5.9.0

  connections:
    - connect: HTTP Upload
      provides:
        - CMSIS-RTOS2
      consumes:
        - CMSIS_ETH
        - CMSIS_MCI
        - CMSIS_VIO
        - STDOUT

  groups:
    - group: Documentation
      files:
        - file: README.md
    - group: Network
      files:
        - file: HTTP_Upload.c
        - file: HTTP_Server_CGI.c
        - file: Web/Web.c

  components:
    - component: ARM::CMSIS:OS Tick:SysTick
    - component: ARM::CMSIS:RTOS2:Keil RTX5&Source
    - component: Keil::CMSIS-Compiler:File Interface:MDK-MW File System
    - component: Keil::File System&MDK:CORE
    - component: Keil::File System&MDK:Drive:Memory Card
    - component: Keil::Network&MDK:CORE
    - component: Keil::Network&MDK:Interface:ETH
    - component: Keil::Network&MDK:Socket:TCP
    - component: Keil::Network&MDK:Socket:UDP
    - component: Keil::Network&MDK:Service:Web Server&HTTP

  layers:
    - layer: $Board-Layer$
      type: Board

  executes:
    - execute: Run FCARM
      run: ${CMAKE_COMMAND} -P $input(0)$ $input$ $output$
      always:
      input:
        - $SolutionDir()$/script/fcarm.cmake
        - Web
        - Web/index.htm
        - Web/pg_header.inc
        - Web/pg_footer.inc
        - Web/home.png
        - Web/keil.gif
        - Web/arm.png
        - Web/llblue.jpg
        - Web/pabb.gif
        - Web/upload.cgi
        - Web/dir.cgi
        - Web/format.cgi
      output:
        - Web/Web.c
