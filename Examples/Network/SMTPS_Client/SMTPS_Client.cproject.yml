project:
  description: SMTPS Client example

  packs:
    - pack: Keil::MDK-Middleware@^8.3.0-0
    - pack: ARM::CMSIS@^6.1.0
    - pack: ARM::CMSIS-RTX@^5.9.0
    - pack: ARM::mbedTLS@^4.0.0

  connections:
    - connect: SMTPS Client
      provides:
        - CMSIS-RTOS2
      consumes:
        - CMSIS_ETH
        - CMSIS_VIO
        - STDOUT

  define:
    - SMTPS_SERVER_VERIFY_NONE
    - MBEDTLS_CONFIG_FILE: \"app_mbedtls_config.h\"
    - TF_PSA_CRYPTO_CONFIG_FILE: \"app_crypto_config.h\"

  groups:
    - group: Documentation
      files:
        - file: README.md
    - group: Network
      files:
        - file: SMTPS_Client.c
        - file: app_mbedtls_config.h
        - file: app_crypto_config.h

  components:
    - component: CMSIS:OS Tick:SysTick
    - component: CMSIS:RTOS2:Keil RTX5&Source
    - component: Network&MDK:CORE
    - component: Network&MDK:Interface:ETH
    - component: Network&MDK:Socket:TCP
    - component: Network&MDK:Socket:UDP
    - component: Network&MDK:Service:DNS Client
    - component: Network&MDK:Service:SMTP Client&SMTPS
    - component: Security:mbed TLS

  layers:
    - layer: $Board-Layer$
      type: Board

  output:
    type:
      - elf
      - hex
      - map
