project:
  description: HTTPS Web Server example

  packs:
    - pack: Keil::MDK-Middleware@>=8.0.0-0
    - pack: ARM::CMSIS@>=6.1.0
    - pack: ARM::CMSIS-RTX@>=5.9.0
    - pack: ARM::mbedTLS@>=3.6.0

  connections:
    - connect: HTTPS Server
      provides:
        - CMSIS-RTOS2
      consumes:
        - CMSIS_ETH
        - CMSIS_VIO
        - STDOUT

  groups:
    - group: Documentation
      files:
        - file: README.md
    - group: Network
      files:
        - file: HTTPS_Server.c
        - file: HTTPS_Server_CGI.c
        - file: Web/Web.c

  components:
    - component: ARM::CMSIS:OS Tick:SysTick
    - component: ARM::CMSIS:RTOS2:Keil RTX5&Source
    - component: Keil::Network&MDK:CORE
    - component: Keil::Network&MDK:Interface:ETH
    - component: Keil::Network&MDK:Socket:TCP
    - component: Keil::Network&MDK:Socket:UDP
    - component: Keil::Network&MDK:Service:Web Server Compact&HTTPS
    - component: ARM::Security:mbed TLS

  layers:
    - layer: $Board-Layer$
      type: Board

  executes:
    - execute: Run FCARM
      run: ${CMAKE_COMMAND} -P $input(0)$ $input$ $output$
      always:
      input:
        - $SolutionDir()$/script/fcarm.cmake
        - Web
        - Web/index.htm
        - Web/pg_header.inc
        - Web/pg_footer.inc
        - Web/ad.cgi
        - Web/ad.cgx
        - Web/buttons.cgi
        - Web/buttons.cgx
        - Web/language.cgi
        - Web/lcd.cgi
        - Web/leds.cgi
        - Web/network.cgi
        - Web/system.cgi
        - Web/tcp.cgi
        - Web/xml_http.js
        - Web/arm.png
        - Web/home.png
        - Web/keil.gif
        - Web/llblue.jpg
        - Web/pabb.gif
      output:
        - Web/Web.c
